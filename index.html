<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="theme-toggle">
        <button id="theme-btn" aria-label="Toggle Theme">🌓</button>
    </div>
    <div class="container">
        <h1>Lotto Number Generator</h1>
        <div class="numbers">
            <!-- Numbers will appear here -->
        </div>
        <button id="generate">Generate Numbers</button>
    </div>

    <div class="contact-container">
        <h2>Partnership Inquiry</h2>
        <form action="https://formspree.io/f/mjgeqgvy" method="POST">
            <div class="form-group">
                <label for="email">Your Email</label>
                <input type="email" id="email" name="email" placeholder="example@email.com" required>
            </div>
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" placeholder="How can we help you?" required></textarea>
            </div>
            <button type="submit" class="submit-btn">Send Inquiry</button>
        </form>
    </div>

    <script src="main.js"></script>
</body>
</html>
